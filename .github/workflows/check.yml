name: Checks

on:
  pull_request:
  push:
    branches:
      - master

# This workflow runs for not-yet-reviewed external contributions and so it
# intentionally has no write access and only limited read access to the
# repository.
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        GO_VERSION:
          - 'oldstable'
          - 'stable'
    steps:
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.0.0
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          cache: true
          go-version: ${{ matrix.GO_VERSION }}
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1

      - name: "go.mod and go.sum consistency check"
        run: make tidy

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        GO_VERSION:
          - 'oldstable'
          - 'stable'
    steps:
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.0.0
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.GO_VERSION }}
          cache: true

      - name: "Unit tests and coverage report"
        run: make cov

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          path: coverage.out
         name: Coverage-report-${{matrix.GO_VERSION}}

  unit-tests-race:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        GO_VERSION:
          - 'oldstable'
          - 'stable'
    steps:
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.0.0
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.GO_VERSION }}
          cache: true

      - name: "Unit tests with race detection"
        run: |
          go test -race ./...
