version: "2"

run:
  timeout: 10m
  concurrency: 4

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - modernize
    - staticcheck
    - unparam
    - unused

formatters:
  settings:
    gofmt:
      simplify: true
